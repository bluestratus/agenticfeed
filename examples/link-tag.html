  Agenticfeed Discovery Tag
  Add this one line to the <head> of every page on your website.
  Replace {your-feed-id} with the feed ID provided in your Agenticfeed dashboard.
  Get your feed ID at https://agenticfeed.ai
-->

<link rel="agenticfeed" type="application/json" href="https://agenticfeed.ai/feed/{your-feed-id}.json">
